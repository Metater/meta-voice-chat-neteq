name: Build meta-voice-chat-neteq

on:
  push:
    branches: [ main, master, dev-metater ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            tool: cargo
          - name: windows-i686
            os: windows-latest
            target: i686-pc-windows-msvc
            tool: cargo
          - name: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            tool: cargo

          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            tool: cargo
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            tool: cargo

          - name: ios-arm64-device
            os: macos-latest
            target: aarch64-apple-ios
            tool: cargo
          - name: ios-arm64-simulator
            os: macos-latest
            target: aarch64-apple-ios-sim
            tool: cargo
          - name: ios-x86_64-simulator
            os: macos-13
            target: x86_64-apple-ios
            tool: cargo

          - name: linux-x86_64-gnu
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tool: cargo
          - name: linux-arm64-gnu
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            tool: cross
          - name: linux-armv7-gnu
            os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            tool: cross

          - name: android-arm64
            os: ubuntu-latest
            target: aarch64-linux-android
            tool: android
            api: 23
          - name: android-armv7
            os: ubuntu-latest
            target: armv7-linux-androideabi
            tool: android
            api: 23
          - name: android-x86_64
            os: ubuntu-latest
            target: x86_64-linux-android
            tool: android
            api: 23
          - name: android-x86
            os: ubuntu-latest
            target: i686-linux-android
            tool: android
            api: 23

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
